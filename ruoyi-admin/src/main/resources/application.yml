# 开发环境配置
server:
  # 服务器的HTTP端口，默认为6039
  port: 6039
  servlet:
    # 应用的访问路径
    context-path: /
  # undertow 配置
  undertow:
    # HTTP post内容的最大大小。当值为-1时，默认值为大小是无限的
    max-http-post-size: -1
    # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    # 每块buffer的空间大小,越小的空间被利用越充分
    buffer-size: 512
    # 是否分配的直接内存
    direct-buffers: true
    threads:
      # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
      io: 8
      # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
      worker: 256

captcha:
  # 是否启用验证码校验
  enable: false
  # 验证码类型 math 数组计算 char 字符验证
  type: MATH
  # line 线段干扰 circle 圆圈干扰 shear 扭曲干扰
  category: CIRCLE
  # 数字验证码位数
  numberLength: 1
  # 字符验证码长度
  charLength: 4

# 日志配置
logging:
  level:
    org.ruoyi: @logging.level@
    org.springframework: warn
    org.mybatis.spring.mapper: error
    org.apache.fury: warn
  config: classpath:logback-plus.xml

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  application:
    name: ruoyi-ai
  # ⚠️ 禁用 Spring Boot 的 Neo4j 自动配置
  # 默认情况下，如果类路径上存在 neo4j-java-driver，Spring Boot 会尝试自动配置
  # 这会导致应用在启动时尝试连接到 Neo4j，即使我们没有需要它
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration
  threads:
    # 开启虚拟线程 仅jdk21可用
    virtual:
      enabled: false
  task:
    execution:
      # 从 springboot 3.5 开始 spring自带线程池
      # 不再需要 AsyncConfig与ThreadPoolConfig 可直接注入线程池使用
      thread-name-prefix: async-
      # 由spring自己初始化线程池
      mode: force
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: @profiles.active@
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  mvc:
    # 设置静态资源路径 防止所有请求都去查静态资源
    static-path-pattern: /static/**
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  jackson:
    # 日期格式化
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      # 格式化输出
      indent_output: false
      # 忽略无法转换的对象
      fail_on_empty_beans: false
    deserialization:
      # 允许对象忽略json中不存在的属性
      fail_on_unknown_properties: false

# Sa-Token配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # jwt秘钥
  jwt-secret-key: abcdefghijklmnopqrstuvwxyz

# security配置
security:
  # 排除路径
  excludes:
    - /*.html
    - /**/*.html
    - /**/*.css
    - /**/*.js
    - /favicon.ico
    - /error
    - /*/api-docs
    - /*/api-docs/**
    - /warm-flow-ui/config
    - /workflow/run
# 多租户配置
tenant:
  # 是否开启
  enable: true
  # 排除表
  excludes:
    - sys_menu
    - sys_tenant
    - sys_tenant_package
    - sys_role_dept
    - sys_role_menu
    - sys_user_post
    - sys_user_role
    - sys_client
    - sys_oss_config
    - flow_spel

# MyBatisPlus配置
# https://baomidou.com/config/
mybatis-plus:
  # 自定义配置 是否全局开启逻辑删除 关闭后 所有逻辑删除功能将失效
  enableLogicDelete: true
  # 多包名使用 例如 org.ruoyi.**.mapper,org.xxx.**.mapper
  mapperPackage: org.ruoyi.**.mapper
  # 对应的 XML 文件位置
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: org.ruoyi.**.domain
  global-config:
    dbConfig:
      # 主键类型
      # AUTO 自增 NONE 空 INPUT 用户输入 ASSIGN_ID 雪花 ASSIGN_UUID 唯一 UUID
      # 如需改为自增 需要将数据库表全部设置为自增
      idType: ASSIGN_ID

# 数据加密
mybatis-encryptor:
  # 是否开启加密
  enable: false
  # 默认加密算法
  algorithm: BASE64
  # 编码方式 BASE64/HEX。默认BASE64
  encode: BASE64
  # 安全秘钥 对称算法的秘钥 如：AES，SM4
  password:
  # 公私钥 非对称算法的公私钥 如：SM2，RSA
  publicKey:
  privateKey:

# api接口加密
api-decrypt:
  # 是否开启全局接口加密
  enabled: false
  # AES 加密头标识
  headerFlag: encrypt-key
  # 响应加密公钥 非对称算法的公私钥 如：SM2，RSA 使用者请自行更换
  # 对应前端解密私钥 
  publicKey: MFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBAJnNwrj4hi/y3CCJu868ghCG5dUj8wZK++RNlTLcXoMmdZWEQ/u02RgD5LyLAXGjLOjbMtC+/J9qofpSGTKSx/MCAwEAAQ==
  # 请求解密私钥 非对称算法的公私钥 如：SM2，RSA 使用者请自行更换
  # 对应前端加密公钥 MFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBAKoR8mX0rGKLqzcWmOzbfj64K8ZIgOdHnzkXSOVOZbFu/TJhZ7rFAN+eaGkl3C4buccQd/EjEsj9ir7ijT7h96MCAwEAAQ==
  privateKey: 

springdoc:
  api-docs:
    # 是否开启接口文档
    enabled: true
  info:
    # 标题
    title: '标题：ruoyi-ai管理系统_接口文档'
    # 描述
    description: '描述：用于管理集团旗下公司的人员信息,具体包括XXX,XXX模块...'
    # 版本
    version: '版本号: ${project.version}'
    # 作者信息
    contact:
      name:  ageerle
      email: ageerle@163.com
      url: https://gitee.com/ageerle/ruoyi-ai

  #这里定义了两个分组，可定义多个，也可以不定义
  group-configs:
    - group: 1.演示模块
      packages-to-scan: org.ruoyi.demo
    - group: 2.通用模块
      packages-to-scan: org.ruoyi.web
    - group: 3.系统模块
      packages-to-scan: org.ruoyi.system
    - group: 4.代码生成模块
      packages-to-scan: org.ruoyi.generator
    - group: 5.工作流模块
      packages-to-scan: org.ruoyi.workflow
    - group: 6.MCP模块
      packages-to-scan: org.ruoyi.mcp

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接
  excludeUrls:
    - /system/notice

--- # 分布式锁 lock4j 全局配置
lock4j:
  # 获取分布式锁超时时间，默认为 3000 毫秒
  acquire-timeout: 3000
  # 分布式锁的超时时间，默认为 30 秒
  expire: 30000

--- # Actuator 监控端点的配置项
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
    logfile:
      external-file: ./logs/sys-console.log

--- # 默认/推荐使用sse推送
sse:
  enabled: true
  path: /resource/sse

--- # websocket
websocket:
  # 如果关闭 需要和前端开关一起关闭
  enabled: false
  # 路径
  path: /resource/websocket
  # 设置访问源地址
  allowedOrigins: '*'

--- # 演示模式配置
demo:
  # 是否开启演示模式（开启后所有写操作将被拦截）
  enabled: false
  # 提示消息
  message: "演示模式，不允许操作"
  # 排除的路径（这些路径不受演示模式限制）
  excludes:
    - /login
    - /logout
    - /register
    - /captcha/**
    - /auth/**
    - /chat/send
    - /system/session/**
    - /system/message/**
    - /system/attach/**
    - /system/fragment/**
    - /system/info/**
--- # warm-flow工作流配置
warm-flow:
  # 是否开启工作流，默认true
  enabled: true
  # 是否开启设计器ui
  ui: true
  # 是否显示流程图顶部文字
  top-text-show: true
  # 是否渲染节点悬浮提示，默认true
  node-tooltip: true
  # 默认Authorization，如果有多个token，用逗号分隔
  token-name: ${sa-token.token-name},clientid

# 向量库配置
vector-store:
  # 向量存储类型 可选(weaviate/milvus/qdrant)
  # 如需修改向量库类型，请修改此配置值!
  type: milvus
  # Weaviate配置
  weaviate:
    protocol: http
    host: 127.0.0.1:6038
    classname: LocalKnowledge
  # Milvus配置
  milvus:
    url: http://localhost:19530
    collectionname: LocalKnowledge
  # Qdrant配置
  qdrant:
    host: localhost
    port: 6334
    collectionname: LocalKnowledge
    api-key:
    use-tls: false

--- # 聊天内存配置
chat:
  memory:
    # 是否启用长期记忆
    enabled: true

    # ========== 内存管理策略 ==========
    # message: 固定消息数量（使用 LangChain4j 原生 MessageWindowChatMemory，不支持 Token 管理和摘要）
    # token: 基于 Token 数量（使用策略框架，支持摘要/截断/滑动窗口）
    # hybrid: Token + 摘要（使用策略框架，功能最全）
    strategy: token

    # ========== 通用配置（所有策略生效）==========
    # 预留给回复的 Token 数
    reserved-for-reply: 2000
    # 是否保护系统消息不被截断
    preserve-system-messages: true

    # ========== message 策略配置 ==========
    # 仅当 strategy=message 时生效，控制保留的消息数量
    max-messages: 20

    # ========== token/hybrid 策略配置 ==========
    # 以下配置仅当 strategy=token 或 hybrid 时生效
    # strategy=message 时这些配置不生效：
    # - max-tokens: 不考虑 Token 限制
    # - summarize-token-ratio: 不触发摘要
    # - summarize-threshold: 不触发摘要
    # - summarizer-strategy: 不创建摘要模型

    # 最大 Token 数（null 则根据模型自动获取）
    max-tokens: null

    # 摘要压缩配置
    # 触发摘要的 Token 使用比例(0.7 = 70%)
    summarize-token-ratio: 0.7
    # 触发摘要的最小消息数
    summarize-threshold: 10
    # 摘要模型策略: current(当前模型) / smart(智能映射) / custom(自定义)
    summarizer-strategy: current
